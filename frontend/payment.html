<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment - Cartify</title>
<link rel="stylesheet" href="style.css">
<style>
  .payment-section {
    margin: 20px 0;
  }
  .payment-method {
    margin: 15px 0;
  }
  .payment-method label {
    display: flex;
    align-items: center;
    cursor: pointer;
    font-size: 16px;
  }
  .payment-method input[type="radio"] {
    margin-right: 10px;
    cursor: pointer;
  }
  .card-fields {
    display: none;
    background-color: #f5f5f5;
    padding: 15px;
    border-radius: 5px;
    margin-top: 15px;
  }
  .card-fields.active {
    display: block;
  }
  .card-fields input {
    display: block;
    width: 100%;
    margin: 10px 0;
  }
</style>
</head>
<body>

<header class="topbar">
<div class="brand">Cartify</div>
<nav class="menu">
<a href="cart.html">Cart</a>
<a href="payment.html">Payment</a>
</nav>
</header>

<section class="section">

<div class="auth-card">

<h2>Checkout</h2>

<!-- Delivery Address -->
<div class="payment-section">
<h3>Delivery Address</h3>
<textarea id="address" placeholder="Enter your full delivery address" style="width: 100%; height: 80px; padding: 10px; border: 1px solid #ccc; border-radius: 5px;"></textarea>
</div>

<!-- Payment Method Selection -->
<div class="payment-section">
<h3>Payment Method</h3>

<div class="payment-method">
<label>
<input type="radio" name="paymentMethod" value="debit" checked onchange="togglePaymentFields()">
Debit Card
</label>
</div>

<div class="payment-method">
<label>
<input type="radio" name="paymentMethod" value="cod" onchange="togglePaymentFields()">
Cash on Delivery
</label>
</div>
</div>

<!-- Card Payment Fields -->
<div id="cardFields" class="card-fields active">
<h3>Card Details</h3>
<input type="text" id="cardName" placeholder="Name on Card">
<input type="text" id="cardNumber" placeholder="Card Number" maxlength="16">
<input type="text" id="cardExpiry" placeholder="MM/YY" maxlength="5">
<input type="text" id="cardCVV" placeholder="CVV" maxlength="3">
</div>

<button class="btn-main full" onclick="checkout()" style="margin-top: 20px;">
Confirm Order
</button>

</div>

</section>

<script src="script.js"></script>
<script>
function togglePaymentFields() {
  const method = document.querySelector('input[name="paymentMethod"]:checked').value;
  const cardFields = document.getElementById('cardFields');
  if (method === 'debit') {
    cardFields.classList.add('active');
  } else {
    cardFields.classList.remove('active');
  }
}
</script>
</body>
</html>
